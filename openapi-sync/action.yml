name: 'OpenAPI Sync'
description: 'Download and validate OpenAPI spec from a remote source'
author: 'BeeL Team'

branding:
  icon: 'download'
  color: 'blue'

inputs:
  spec-url:
    description: 'URL to download OpenAPI spec from'
    required: true
  
  spec-hash:
    description: 'Expected SHA256 hash for validation (optional)'
    required: false
    default: ''
  
  output-file:
    description: 'Output filename for the spec'
    required: false
    default: 'openapi.yaml'
  
  verify-hash:
    description: 'Whether to verify the hash (requires spec-hash)'
    required: false
    default: 'true'
  
  github-token:
    description: 'GitHub token for private repos (optional, defaults to github.token)'
    required: false
    default: ''

outputs:
  spec-path:
    description: 'Path to the downloaded spec'
    value: ${{ steps.download.outputs.spec-path }}
  
  spec-hash:
    description: 'Actual SHA256 hash of downloaded spec'
    value: ${{ steps.hash.outputs.hash }}
  
  has-changes:
    description: 'Whether the spec changed compared to current version'
    value: ${{ steps.check.outputs.has-changes }}

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        echo "🔍 Checking for curl..."
        if command -v curl &> /dev/null; then
          echo "✅ curl is already installed"
        else
          echo "📦 Installing curl..."
          sudo apt-get update -qq
          sudo apt-get install -y curl
          echo "✅ curl installed successfully"
        fi
        curl --version
    
    - name: Download OpenAPI spec
      id: download
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        SPEC_URL="${{ inputs.spec-url }}"
        OUTPUT="${{ inputs.output-file }}"
        
        # Use provided token or fallback to default
        if [ -z "$GITHUB_TOKEN" ]; then
          GITHUB_TOKEN="${{ github.token }}"
        fi
        
        echo "📥 Downloading OpenAPI spec from:"
        echo "   $SPEC_URL"
        echo "   → $OUTPUT"
        
        # Check if it's a GitHub raw URL
        if [[ "$SPEC_URL" == *"raw.githubusercontent.com"* ]]; then
          echo "🔍 Detected GitHub raw URL - using API with authentication..."
          
          # Extract parts from URL using string manipulation
          # Format: https://raw.githubusercontent.com/OWNER/REPO/REF/PATH
          URL_WITHOUT_PROTOCOL="${SPEC_URL#https://raw.githubusercontent.com/}"
          
          OWNER=$(echo "$URL_WITHOUT_PROTOCOL" | cut -d'/' -f1)
          REPO=$(echo "$URL_WITHOUT_PROTOCOL" | cut -d'/' -f2)
          REF=$(echo "$URL_WITHOUT_PROTOCOL" | cut -d'/' -f3)
          PATH=$(echo "$URL_WITHOUT_PROTOCOL" | cut -d'/' -f4-)
          
          echo "   Owner: $OWNER"
          echo "   Repo:  $REPO"
          echo "   Ref:   $REF"
          echo "   Path:  $PATH"
          
          # Use GitHub API to download (supports private repos)
          API_URL="https://api.github.com/repos/$OWNER/$REPO/contents/$PATH?ref=$REF"
          echo "   API URL: $API_URL"
          
          if curl -fsSL \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            -o "$OUTPUT" \
            "$API_URL"; then
            echo "✅ Download successful (GitHub API with auth)"
          else
            echo "❌ Failed to download spec via GitHub API"
            echo "   This usually means:"
            echo "   - The token doesn't have access to the repo"
            echo "   - The file doesn't exist at that path/ref"
            echo "   Verify the token has 'repo' scope and access to $OWNER/$REPO"
            exit 1
          fi
        else
          # Non-GitHub raw URL - use curl
          echo "Non-GitHub URL - downloading directly..."
          if curl -fsSL -o "$OUTPUT" "$SPEC_URL"; then
            echo "✅ Download successful"
          else
            echo "❌ Failed to download spec from $SPEC_URL"
            exit 1
          fi
        fi
        
        # Verify it's valid YAML
        if grep -q "openapi:" "$OUTPUT"; then
          echo "✅ Valid OpenAPI spec detected"
        else
          echo "⚠️  Warning: 'openapi:' field not found (might not be OpenAPI 3.x)"
        fi
        
        echo "spec-path=$OUTPUT" >> $GITHUB_OUTPUT
    
    - name: Calculate hash
      id: hash
      shell: bash
      run: |
        HASH=$(sha256sum "${{ inputs.output-file }}" | cut -d' ' -f1)
        echo "hash=$HASH" >> $GITHUB_OUTPUT
        echo "📊 SHA256: $HASH"
    
    - name: Verify hash
      if: inputs.verify-hash == 'true' && inputs.spec-hash != ''
      shell: bash
      run: |
        EXPECTED="${{ inputs.spec-hash }}"
        ACTUAL="${{ steps.hash.outputs.hash }}"
        
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "❌ Hash mismatch!"
          echo "   Expected: $EXPECTED"
          echo "   Actual:   $ACTUAL"
          echo ""
          echo "This could indicate:"
          echo "  - The remote spec was modified since dispatch"
          echo "  - Network corruption"
          echo "  - Man-in-the-middle attack"
          exit 1
        fi
        
        echo "✅ Hash verified successfully"
    
    - name: Check for changes
      id: check
      shell: bash
      run: |
        if git diff --exit-code "${{ inputs.output-file }}" 2>/dev/null; then
          echo "has-changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️  No changes detected (spec is up to date)"
        else
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "✅ Changes detected - spec was updated"
        fi
